name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift package dependencies
        run: xcodebuild -resolvePackageDependencies -scheme NabtoClient

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme NabtoClient \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions
